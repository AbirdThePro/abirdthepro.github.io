<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width">
    </head>
    <body>
        <div class="header">
            <h1 class="page-title">AbirdThePro</h1>
            <h2 class="page-subtitle">Projects and Games</h2>
        </div>

        <div class="slideshow-container">
            <div class="slide" onclick="location.href = 'https://github.com/AbirdThePro/Autoclicker'">
                <h3 class="slide-title">Autoclicker</h3>
                <p class="slide-text"></p>
            </div>
            <div class="slide" onclick="location.href = 'https://github.com/AbirdThePro/MyOS'">
                <h3 class="slide-title">MyOS</h3>
                <p class="slide-text"></p>
            </div>
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>

        <div class="footer">
            <p class="footer-text">
                This is the footer.
            </p>
        </div>
    </body>
    <style>
        @font-face {
            font-family: flix;
            src: url(Flix-Normal.ttf);
        }

        @font-face {
            font-family: flix-outline;
            src: url(Flix-Outline.ttf);
        }

        .page-title {
            font-family: flix;
            font-size: 5pc;
            color: #FFFFFF;
            text-align: left;
            letter-spacing: 0.1ch;
        }
        
        .page-subtitle {
            font-family: flix-outline;
            font-size: 3pc;
            color: #FFFFFF;
            text-align: right;
            letter-spacing: 0.1ch;
        }

        .header {
            top: 0%;
            padding-top: 1%;
            padding-bottom: 1%;
            padding-left: 1%;
            padding-right: 1%;
            text-align: center;
            background-color: #0000FF;
            position: sticky;
            position: -webkit-sticky;
        }

        .footer {
            text-align: center;
            background-color: #0000FF;
            top: 95%;
        }

        .footer-text {
            font-family: Arial, Helvetica, sans-serif;
            color: #FFFFFF;
        }

        a {
            font-family: Arial, Helvetica, sans-serif;
            display: block;
            background-color: #00FFEA;
        }

        body {
            background-color: #222222;
        }
    </style>
    <script>
        let currentSlide = 0;

        function plusSlides(n) {
            let slides = document.getElementsByClassName("slide");
            currentSlide += n;
            for (let i=0; i<slides.length; i++) {
                if (i == currentSlide) slides[i].style.display = "all";
                else slides[i].style.display = "block";
            }
        }
    </script>
</html>
